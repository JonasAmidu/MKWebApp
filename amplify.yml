version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 16 # specify the Node.js version
    commands:
      - cd frontend
      - npm install
  build:
    commands:
      - npm run build
      - mkdir -p /codebuild/output/src3911753816/src/MKWebApp
      - cp -R build/* /codebuild/output/src3911753816/src/MKWebApp/

artifacts:
  files:
    - '**/*'
  base-directory: /codebuild/output/src3911753816/src/MKWebApp

